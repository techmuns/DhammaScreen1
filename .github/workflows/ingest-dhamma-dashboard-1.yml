name: Ingest Dhamma Dashboard 1

on:
  workflow_dispatch:
  schedule:
    # Weekly run, Mondays 03:30 UTC (~09:00 IST). Re-evaluate cadence once
    # the first real source adapter is wired and we know its cost profile.
    - cron: "30 3 * * 1"

# Required so the commit-back step can push refreshed snapshots.
permissions:
  contents: write

jobs:
  ingest:
    name: Pull snapshots, typecheck, build
    runs-on: ubuntu-latest
    # Raised from 20 → 45 in Step 13 as a safety margin. The expected
    # runtime after dropping Playwright + headless Chromium and using
    # peer-mode=static is well under 20 minutes for the current 20-company
    # universe, but 45 leaves room for a slow Screener day or a transient
    # network blip without prematurely cancelling the run.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need a real token (not the ephemeral one) so the subsequent push
          # is authenticated.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch the full history is not required, but persist-credentials
          # is needed so `git push` works without a manual remote setup.
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Note: the Playwright Chromium install step was removed in Step 13.
      # Dashboard 1 no longer renders the standalone Screener peer table —
      # KPI peer benchmarks are computed from the financial rows the static
      # fetcher already returns. Keeping Chromium out of the workflow drops
      # ~3 minutes of install time per run and avoids any chance of the
      # browser-related steps blowing through the workflow timeout.
      # The `playwright` dependency itself is intentionally kept in
      # package.json so `npm ci` stays reproducible and a developer can
      # still run the headless peer fetch locally if needed.

      - name: Ingest snapshots
        run: npm run ingest:dhamma

      # Automated Screener fetch. Writes status rows for each company; if
      # Screener blocks the runner the script records that honestly and
      # exits 0 — the workflow does NOT fail just because Screener is
      # unreachable. --peer-mode static skips the (now unused) headless
      # peer-table fallback entirely. --timeout-ms 15000 caps each HTTP
      # request at 15s, so 20 companies finish in well under 20 minutes
      # even when every request hits the upper retry budget.
      - name: Ingest Screener fetch (consolidated, static)
        run: npm run ingest:screener:fetch -- --peer-mode static --timeout-ms 15000

      # Optional: parses client-provided Screener exports from
      # data/manual/screener/. Passes cleanly (empty snapshots) when no
      # files are present, so this step is safe to leave always-on.
      - name: Ingest Screener exports (optional)
        run: npm run ingest:screener

      # Optional (Step 17): probe candidate guidance sources (Tijori,
      # Screener documents tab, ...) for management commentary
      # documents. Discovery only — never extracts guidance claims,
      # never writes to guidance-commentary.json. Default-enabled
      # sources only (no Playwright). The step is allowed to fail
      # without breaking the main dashboard build because it's a
      # data-collection probe, not a render-blocking dependency.
      - name: Discover guidance sources (probe)
        continue-on-error: true
        run: npm run ingest:guidance:sources -- --timeout-ms 15000

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Commit refreshed snapshots
        # Only commit-back on dispatch or schedule (not on accidental
        # pushes that might trigger this workflow in future).
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          git add src/data/snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          # NOTE: keep the snapshot commit message free of any CI-skip
          # marker. Cloudflare and other CIs honour those markers and the
          # live dashboard would never see refreshed data. The workflow
          # itself is gated on workflow_dispatch / schedule (never on
          # push), so the data commit cannot retrigger this workflow
          # regardless of the message.
          git commit -m "chore(data): refresh Dhamma dashboard snapshots"
          git push origin HEAD:${GITHUB_REF_NAME}
