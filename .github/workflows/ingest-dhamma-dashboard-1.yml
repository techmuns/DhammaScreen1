name: Ingest Dhamma Dashboard 1

on:
  workflow_dispatch:
  schedule:
    # Weekly run, Mondays 03:30 UTC (~09:00 IST). Re-evaluate cadence once
    # the first real source adapter is wired and we know its cost profile.
    - cron: "30 3 * * 1"

# Required so the commit-back step can push refreshed snapshots.
permissions:
  contents: write

jobs:
  ingest:
    name: Pull snapshots, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need a real token (not the ephemeral one) so the subsequent push
          # is authenticated.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch the full history is not required, but persist-credentials
          # is needed so `git push` works without a manual remote setup.
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ingest snapshots
        run: npm run ingest:dhamma

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Commit refreshed snapshots
        # Only commit-back on dispatch or schedule (not on accidental
        # pushes that might trigger this workflow in future).
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          git add src/data/snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          # [skip ci] in the commit message prevents the resulting commit
          # from triggering downstream workflows.
          git commit -m "chore(data): refresh Dhamma dashboard snapshots [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
