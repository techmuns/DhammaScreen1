name: Ingest Dhamma Dashboard 1

on:
  workflow_dispatch:
  schedule:
    # Weekly run, Mondays 03:30 UTC (~09:00 IST). Re-evaluate cadence once
    # the first real source adapter is wired and we know its cost profile.
    - cron: "30 3 * * 1"

# Required so the commit-back step can push refreshed snapshots.
permissions:
  contents: write

jobs:
  ingest:
    name: Pull snapshots, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need a real token (not the ephemeral one) so the subsequent push
          # is authenticated.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch the full history is not required, but persist-credentials
          # is needed so `git push` works without a manual remote setup.
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # `npm install` instead of `npm ci` so a freshly added devDep
        # (e.g. playwright for the headless peer fallback) works on the
        # first run before the lockfile gets refreshed in a follow-up PR.
        # The commit-back step only commits src/data/snapshots/, so a
        # transiently regenerated lockfile on the runner does not pollute
        # the repo.
        run: npm install --no-audit --no-fund

      # Headless Chromium for the Screener peer-comparison fallback only.
      # The static financial fetch path does NOT need a browser; only
      # Strategy D (peer-mode=auto/headless) reaches for Chromium when
      # static strategies return no rows. Failure here would block the
      # peer fetch but not the financial fetch, so the step is fault-tolerant.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Ingest snapshots
        run: npm run ingest:dhamma

      # Optional: automated Screener fetch. Writes status rows for each
      # company; if Screener blocks the runner the script records that
      # honestly and exits 0 — the workflow does NOT fail just because
      # Screener is unreachable. --peer-mode auto tries static strategies
      # first, then falls back to headless Chromium for the peer table.
      - name: Ingest Screener fetch (optional)
        run: npm run ingest:screener:fetch -- --peer-mode auto

      # Optional: parses client-provided Screener exports from
      # data/manual/screener/. Passes cleanly (empty snapshots) when no
      # files are present, so this step is safe to leave always-on.
      - name: Ingest Screener exports (optional)
        run: npm run ingest:screener

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Commit refreshed snapshots
        # Only commit-back on dispatch or schedule (not on accidental
        # pushes that might trigger this workflow in future).
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          git add src/data/snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          # NOTE: keep the snapshot commit message free of any CI-skip
          # marker. Cloudflare and other CIs honour those markers and the
          # live dashboard would never see refreshed data. The workflow
          # itself is gated on workflow_dispatch / schedule (never on
          # push), so the data commit cannot retrigger this workflow
          # regardless of the message.
          git commit -m "chore(data): refresh Dhamma dashboard snapshots"
          git push origin HEAD:${GITHUB_REF_NAME}
